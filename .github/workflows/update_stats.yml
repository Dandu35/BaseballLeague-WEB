name: Actualizar Estadisticas FENABS

on:
  schedule:
    # Se ejecuta todos los días a las 00:00 (hora UTC)
    - cron: '0 0 * * *'
  workflow_dispatch: # Permite ejecutarlo manualmente con un botón

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Instalar librerias necesarias
        run: |
          pip install requests beautifulsoup4 pandas

      - name: Ejecutar el robot extractor
        run: python scraper.py

      - name: Guardar cambios y subir a la web
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git add liga_data.json
          git commit -m "Actualización automática de estadísticas" || exit 0
          git push
