<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>FN HUB | Pro Scouting System</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;700&display=swap');
        
        body { 
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            color: white;
        }
        .font-game { font-family: 'Orbitron', sans-serif; }

        /* Navegación */
        .nav-btn { transition: 0.3s; opacity: 0.5; border-bottom: 2px solid transparent; }
        .nav-btn.active { opacity: 1; color: #22c55e; border-bottom: 2px solid #22c55e; }

        /* Lista de Jugadores */
        .player-btn {
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 0px solid #22c55e;
        }
        .player-btn.active {
            background: #22c55e;
            color: black;
            transform: translateX(10px);
            border-left: 6px solid white;
        }

        /* Filtros */
        .pos-filter { cursor: pointer; transition: 0.2s; opacity: 0.4; font-family: 'Orbitron'; font-size: 9px; }
        .pos-filter.active { opacity: 1; color: #22c55e; border-bottom: 1px solid #22c55e; }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #22c55e; }
        
        .page-transition { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="flex flex-col">

    <nav class="flex gap-6 p-4 bg-black/60 border-b border-white/10 z-[100] backdrop-blur-md">
        <div class="flex items-center gap-2 mr-8">
            <div class="bg-green-500 text-black font-black px-2 py-0.5 text-xs italic">FN</div>
            <span class="font-game text-sm tracking-tighter">HUB_v2.6</span>
        </div>
        <button onclick="changePage('home')" class="nav-btn px-4 py-2 font-game text-[10px] tracking-widest active" id="btn-home">HOME</button>
        <button onclick="changePage('roster')" class="nav-btn px-4 py-2 font-game text-[10px] tracking-widest" id="btn-roster">ROSTER</button>
        <button onclick="changePage('ranking')" class="nav-btn px-4 py-2 font-game text-[10px] tracking-widest" id="btn-ranking">RANKING</button>
    </nav>

    <div class="flex-1 overflow-hidden relative">

        <div id="page-home" class="page p-12 h-full page-transition">
            <h2 class="font-game text-6xl italic mb-4 uppercase">System_Active</h2>
            <p id="update-info" class="text-green-500 font-mono text-[10px] mb-12 tracking-[0.3em]"></p>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-5xl">
                <div class="bg-white/5 p-8 border-l-4 border-green-500">
                    <h3 class="font-game text-lg mb-4">SCOUTING MODULE</h3>
                    <p class="text-slate-400 text-sm leading-relaxed">Base de datos sincronizada con FENABS Grupo Norte. Análisis situacional de bateo y métricas de pitcheo activas. Seleccione 'ROSTER' para iniciar el visor.</p>
                </div>
            </div>
        </div>

        <div id="page-roster" class="page hidden h-full flex overflow-hidden page-transition">
            <aside class="w-1/4 flex flex-col p-6 bg-black/40 border-r border-white/5">
                <div class="flex justify-between mb-6 border-b border-white/10 pb-4">
                    <button onclick="filterPos('ALL')" class="pos-filter active" id="f-all">ALL</button>
                    <button onclick="filterPos('PITCHER')" class="pos-filter" id="f-pitcher">PITCHERS</button>
                    <button onclick="filterPos('INFIELD')" class="pos-filter" id="f-infield">BATTERS</button>
                </div>
                <div id="player-list" class="flex-1 overflow-y-auto custom-scrollbar space-y-1"></div>
            </aside>

            <section class="flex-1 relative flex items-center justify-center p-12">
                <div class="absolute w-[500px] h-[500px] bg-green-500/5 blur-[120px] rounded-full"></div>
                
                <div class="relative z-10 flex w-full h-full items-center gap-8">
                    <div class="w-2/5 h-full flex items-center justify-center">
                        <img id="main-photo" src="" class="h-[85vh] object-contain transition-all duration-500">
                    </div>

                    <div class="w-3/5 space-y-6">
                        <header>
                            <span id="v-team" class="text-[10px] font-game text-green-500 tracking-[0.4em] mb-2 block uppercase"></span>
                            <h2 id="v-name" class="font-game text-5xl font-black italic uppercase leading-none pb-4 border-b border-white/10">---</h2>
                            <span id="v-pos" class="inline-block px-3 py-1 bg-green-500 text-black font-black text-[9px] mt-4 skew-x-[-15deg]">POS: ---</span>
                        </header>

                        <div class="bg-black/60 p-8 rounded-[40px] border border-white/5 grid grid-cols-2 gap-8 shadow-2xl backdrop-blur-md">
                            <div class="relative">
                                <canvas id="radarChart"></canvas>
                            </div>
                            <div class="flex flex-col justify-center space-y-6">
                                <div class="bg-slate-900/80 p-4 border-r-4 border-green-500 text-right">
                                    <p id="label-vs-r" class="text-[8px] text-slate-500 uppercase font-bold mb-1">VS RIGHT AVG</p>
                                    <p id="v-vs-r" class="font-game text-3xl">.000</p>
                                </div>
                                <div class="bg-slate-900/80 p-4 border-r-4 border-blue-500 text-right">
                                    <p id="label-clutch" class="text-[8px] text-slate-500 uppercase font-bold mb-1">CLUTCH (w/R)</p>
                                    <p id="v-w-r" class="font-game text-3xl text-green-500">.000</p>
                                </div>
                                <div class="flex justify-around pt-4 border-t border-white/10 opacity-50">
                                    <div class="text-center"><p class="text-[8px]">FLY/GND</p><p id="v-ratio" class="font-game text-sm">0.0</p></div>
                                    <div class="text-center"><p class="text-[8px]">EMPTY</p><p id="v-empty" class="font-game text-sm">.000</p></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <div id="page-ranking" class="page hidden p-12 overflow-y-auto h-full page-transition">
            <h2 class="font-game text-4xl mb-12 italic text-center text-green-500 uppercase tracking-widest">League_Standings</h2>
            <div id="ranking-container" class="max-w-4xl mx-auto bg-black/40 rounded-3xl border border-white/5 overflow-hidden"></div>
        </div>

    </div>

    <script>
        let ligaData = { jugadores: [], clasificacion: [] };
        let radarChart = null;
        let currentPosFilter = 'ALL';

        async function init() {
            try {
                const res = await fetch('liga_data.json');
                ligaData = await res.json();
                document.getElementById('update-info').innerText = `>> DATA_SOURCE_LINKED: ${ligaData.actualizado}`;
                renderRoster();
            } catch(e) { console.error("Error cargando base de datos", e); }
        }

        function changePage(pId) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`page-${pId}`).classList.remove('hidden');
            document.getElementById(`btn-${pId}`).classList.add('active');
            if(pId === 'ranking') renderRanking();
        }

        function filterPos(pos) {
            currentPosFilter = pos;
            document.querySelectorAll('.pos-filter').forEach(b => b.classList.remove('active'));
            document.getElementById(`f-${pos.toLowerCase()}`).classList.add('active');
            renderRoster();
        }

        function renderRoster() {
            const list = document.getElementById('player-list');
            list.innerHTML = '';
            const filtered = ligaData.jugadores.filter(p => currentPosFilter === 'ALL' || p.posicion === currentPosFilter);
            
            filtered.forEach((p, i) => {
                const btn = document.createElement('button');
                btn.className = `player-btn w-full p-4 text-left font-game text-[10px] uppercase italic bg-white/5 mb-1 flex justify-between items-center`;
                btn.innerHTML = `<span>${p.nombre.replace(/\./g, '')}</span> <span class="text-[7px] opacity-20">${p.equipo}</span>`;
                btn.onclick = () => selectPlayer(p, btn);
                list.appendChild(btn);
                if(i === 0) selectPlayer(p, btn);
            });
        }

        function selectPlayer(p, btn) {
            document.querySelectorAll('.player-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const photo = document.getElementById('main-photo');
            photo.style.opacity = 0;
            photo.style.transform = "translateX(20px)";

            setTimeout(() => {
                const nameClean = p.nombre.replace(/\./g, '');
                document.getElementById('v-name').innerText = nameClean;
                document.getElementById('v-team').innerText = p.equipo;
                document.getElementById('v-vs-r').innerText = p.avg_vs_r;
                document.getElementById('v-w-r').innerText = p.avg_runners;
                document.getElementById('v-empty').innerText = p.avg_empty;
                document.getElementById('v-ratio').innerText = p.ratio;
                document.getElementById('v-pos').innerText = `POSICIÓN: ${p.posicion}`;

                // Cambio de etiquetas si es Pitcher
                const lblR = document.getElementById('label-vs-r');
                const lblC = document.getElementById('label-clutch');
                if(p.posicion === "PITCHER") {
                    lblR.innerText = "OPP AVG VS R";
                    lblC.innerText = "OPP AVG W/RUNNERS";
                    document.getElementById('v-pos').classList.replace('bg-green-500', 'bg-blue-500');
                } else {
                    lblR.innerText = "VS RIGHT AVG";
                    lblC.innerText = "CLUTCH (w/R)";
                    document.getElementById('v-pos').classList.replace('bg-blue-500', 'bg-green-500');
                }

                // Carga de imagen (PNG/JPG)
                const folder = "fotos/jugadores/";
                const file = nameClean.trim().replace(/\s+/g, '_');
                const img = new Image();
                img.src = `${folder}${file}.jpg`;
                img.onload = () => { photo.src = img.src; photo.style.opacity = 1; photo.style.transform = "translateX(0)"; };
                img.onerror = () => {
                    const img2 = new Image();
                    img2.src = `${folder}${file}.png`;
                    img2.onload = () => { photo.src = img2.src; photo.style.opacity = 1; photo.style.transform = "translateX(0)"; };
                    img2.onerror = () => { photo.src = 'https://via.placeholder.com/600x800/020617/22c55e?text=NO_AVATAR'; photo.style.opacity = 1; photo.style.transform = "translateX(0)"; };
                };

                updateRadar([
                    normalize(p.avg_empty), normalize(p.avg_runners), normalize(p.avg_vs_r), parseFloat(p.ratio)*35, 80
                ]);
            }, 250);
        }

        function normalize(val) {
            let v = parseFloat(val.replace('.', '0.'));
            if(isNaN(v)) return 10;
            return Math.min(Math.max((v / 0.450) * 100, 15), 95);
        }

        function updateRadar(stats) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            if (radarChart) radarChart.destroy();
            radarChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['CONTACT', 'CLUTCH', 'VS_RIGHT', 'POWER', 'CONSISTENCY'],
                    datasets: [{ data: stats, backgroundColor: 'rgba(34, 197, 94, 0.2)', borderColor: '#22c55e', borderWidth: 2, pointRadius: 0 }]
                },
                options: {
                    scales: { r: { min: 0, max: 100, ticks: { display: false }, grid: { color: 'rgba(255,255,255,0.05)' }, angleLines: { color: 'rgba(255,255,255,0.05)' }, pointLabels: { color: '#64748b', font: { family: 'Orbitron', size: 7 } } } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function renderRanking() {
            const container = document.getElementById('ranking-container');
            container.innerHTML = `<table class="w-full text-left font-game text-[10px] uppercase">
                <thead class="bg-white/5"><tr><th class="p-6">POS</th><th class="p-6">TEAM</th><th class="p-6 text-center">W-L</th><th class="p-6 text-center text-green-500">AVG</th></tr></thead>
                <tbody class="divide-y divide-white/5">${ligaData.clasificacion.map(e => `<tr><td class="p-6 opacity-30">${e.pos}</td><td class="p-6 italic">${e.equipo}</td><td class="p-6 text-center">${e.pg}-${e.pp}</td><td class="p-6 text-center font-mono text-green-500">${e.avg}</td></tr>`).join('')}</tbody></table>`;
        }

        init();
    </script>
</body>
</html>
