<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>FN HUB | Player Selection 2026</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;700&display=swap');
        
        body { 
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            color: white;
        }

        .font-game { font-family: 'Orbitron', sans-serif; }

        .scanline {
            width: 100%; height: 100px;
            background: linear-gradient(0deg, rgba(34, 197, 94, 0.05) 0%, transparent 100%);
            position: absolute; top: -100px; left: 0;
            animation: scan 4s linear infinite;
            pointer-events: none;
        }
        @keyframes scan { 0% { top: -100px; } 100% { top: 100%; } }

        .player-btn {
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-left: 0px solid #22c55e;
        }
        .player-btn:hover, .player-btn.active {
            background: rgba(34, 197, 94, 0.9);
            color: black;
            transform: translateX(15px);
            border-left: 8px solid white;
        }

        #main-photo {
            transition: opacity 0.4s ease, transform 0.5s ease;
        }

        /* Scrollbar estilo retro */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #22c55e; }
    </style>
</head>
<body class="flex flex-col">

    <div class="scanline"></div>

    <header class="p-6 flex justify-between items-center border-b border-white/10 glass z-50">
        <div class="flex items-center gap-4">
            <div class="bg-green-500 text-black font-black px-2 py-1 font-game italic">LVL 26</div>
            <h1 class="font-game text-2xl font-black italic tracking-widest">PLAYER<span class="text-green-500">_STAT</span></h1>
        </div>
        <div id="update-info" class="text-[9px] font-mono opacity-40 uppercase"></div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        
        <aside class="w-1/3 p-6 overflow-y-auto custom-scrollbar bg-black/20">
            <div class="mb-6 border-b border-white/10 pb-2">
                <p class="text-[10px] font-bold text-slate-500 uppercase tracking-widest italic">Roster_Database</p>
            </div>
            <div id="player-list" class="space-y-2"></div>
        </aside>

        <section class="flex-1 relative overflow-hidden flex items-center justify-center">
            
            <div class="absolute w-[500px] h-[500px] bg-green-500/10 blur-[120px] rounded-full"></div>

            <div class="relative z-10 flex w-full h-full items-center px-12">
                
                <div class="w-1/2 h-full flex items-center justify-center relative">
                    <img id="main-photo" src="" class="h-[85%] object-contain z-10">
                </div>

                <div class="w-1/2 space-y-8">
                    <div>
                        <div id="v-team" class="inline-block px-3 py-1 bg-white/10 text-xs font-bold mb-4 skew-x-[-15deg]"></div>
                        <h2 id="v-name" class="font-game text-5xl font-black italic uppercase leading-none block">---</h2>
                    </div>

                    <div class="grid grid-cols-2 gap-px bg-white/10 border border-white/10">
                        <div class="bg-slate-900/80 p-6">
                            <p class="text-[10px] text-green-500 font-bold uppercase mb-2">VS_RIGHT_AVG</p>
                            <p id="v-vs-r" class="font-game text-4xl">---</p>
                        </div>
                        <div class="bg-slate-900/80 p-6">
                            <p class="text-[10px] text-blue-400 font-bold uppercase mb-2">RUNNERS_ON</p>
                            <p id="v-w-r" class="font-game text-4xl">---</p>
                        </div>
                        <div class="bg-slate-900/80 p-6 col-span-2 flex justify-between items-center">
                            <div>
                                <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">FLY/GND_RATIO</p>
                                <p id="v-ratio" class="font-game text-2xl text-white">0.0</p>
                            </div>
                            <div class="text-right">
                                <p class="text-[10px] text-slate-500 font-bold uppercase mb-1">EMPTY_AVG</p>
                                <p id="v-empty" class="font-game text-xl opacity-50">.000</p>
                            </div>
                        </div>
                    </div>

                    <div class="flex gap-2">
                        <div class="h-2 flex-1 bg-green-500/20"><div class="h-full bg-green-500 w-3/4"></div></div>
                        <div class="h-2 flex-1 bg-green-500/20"><div class="h-full bg-green-500 w-1/2"></div></div>
                        <div class="h-2 flex-1 bg-green-500/20"><div class="h-full bg-green-500 w-full"></div></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        let players = [];

        async function init() {
            try {
                const res = await fetch('liga_data.json');
                const data = await res.json();
                players = data.jugadores;
                document.getElementById('update-info').innerText = `SYS_LOAD: ${data.actualizado}`;
                
                const list = document.getElementById('player-list');
                players.forEach((p, index) => {
                    const btn = document.createElement('button');
                    btn.className = `player-btn w-full p-4 text-left font-game text-[11px] uppercase italic bg-white/5 flex justify-between items-center`;
                    btn.innerHTML = `<span>${p.nombre}</span> <span class="opacity-20 text-[8px]">${p.equipo}</span>`;
                    btn.onclick = () => selectPlayer(p, btn);
                    list.appendChild(btn);
                    if(index === 0) selectPlayer(p, btn);
                });
            } catch(e) { console.error("Error cargando JSON", e); }
        }

        function selectPlayer(p, btn) {
    document.querySelectorAll('.player-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');

    const mainPhoto = document.getElementById('main-photo');
    mainPhoto.style.opacity = 0;
    
    setTimeout(() => {
        // Limpiamos el nombre del jugador (quitamos puntos y ponemos guiones bajos)
        let cleanName = p.nombre.replace(/\./g, '').trim().replace(/\s+/g, '_');
        
        // Intentamos cargar el JPG que acabas de renombrar
        const imgPath = `fotos/jugadores/${cleanName}.jpg`;
        
        const tempImg = new Image();
        tempImg.src = imgPath;
        
        tempImg.onload = () => {
            mainPhoto.src = imgPath;
            mainPhoto.style.opacity = 1;
        };
        
        tempImg.onerror = () => {
            // Si el JPG falla, intenta PNG por si acaso
            const pngPath = `fotos/jugadores/${cleanName}.png`;
            const tempPng = new Image();
            tempPng.src = pngPath;
            
            tempPng.onload = () => {
                mainPhoto.src = pngPath;
                mainPhoto.style.opacity = 1;
            };
            
            tempPng.onerror = () => {
                // Si ambos fallan, silueta por defecto
                mainPhoto.src = 'https://via.placeholder.com/600x800/020617/22c55e?text=NO_IMAGE';
                mainPhoto.style.opacity = 1;
            };
        };

        // Actualizar textos del HUD
        document.getElementById('v-name').innerText = p.nombre.replace(/\./g, '');
        document.getElementById('v-team').innerText = p.equipo;
        document.getElementById('v-vs-r').innerText = p.avg_vs_r;
        document.getElementById('v-w-r').innerText = p.avg_runners;
        document.getElementById('v-ratio').innerText = p.ratio;
        
    }, 300);
}
        init();
    </script>
</body>
</html>
