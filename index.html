<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Liga Nacional 1ª Div - 2026</title>
</head>
<body class="bg-[#0f172a] text-slate-200 font-sans">
    <nav class="p-6 border-b border-slate-800 bg-slate-900/50 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black tracking-tighter italic text-green-400">FENABS <span class="text-white font-normal not-italic text-sm">| G. NORTE</span></h1>
            <div class="space-x-6 text-sm font-bold uppercase tracking-widest">
                <a href="#resultados" class="hover:text-green-400">Resultados</a>
                <a href="#clasificacion" class="hover:text-green-400">Clasificación</a>
                <a href="#jugadores" class="hover:text-green-400">Jugadores</a>
            </div>
        </div>
    </nav>

    <section class="max-w-7xl mx-auto p-8">
        <div class="bg-gradient-to-r from-green-600 to-blue-700 rounded-3xl p-1 text-center shadow-2xl">
            <div class="bg-slate-950 rounded-[22px] p-8">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Último Partido Destacado</p>
                <div class="flex justify-center items-center gap-12">
                    <div class="text-center">
                        <img src="fotos/logos/ama.png" class="h-16 mx-auto mb-2">
                        <p class="text-2xl font-black">AMAYA</p>
                    </div>
                    <div class="text-5xl font-mono font-black text-green-400">2 - 13</div>
                    <div class="text-center">
                        <img src="fotos/logos/arg.png" class="h-16 mx-auto mb-2">
                        <p class="text-2xl font-black">ARGA</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="jugadores" class="max-w-7xl mx-auto p-8">
        <h3 class="text-3xl font-bold mb-8 italic">ROSTERS DESTACADOS</h3>
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="bg-slate-900 border border-slate-800 rounded-2xl p-4 hover:scale-105 transition">
                <div class="relative mb-4">
                    <img src="fotos/jugadores/mohamed.jpg" class="rounded-xl w-full h-48 object-cover">
                    <span class="absolute top-2 right-2 bg-green-500 text-black text-[10px] font-black px-2 py-1 rounded-full">LÍDER AVG</span>
                </div>
                <h4 class="font-bold text-lg">MOHAMED Tasser</h4>
                <div class="flex justify-between mt-4 text-sm border-t border-slate-800 pt-4">
                    <div class="text-center">
                        <p class="text-slate-500 text-xs">AVG</p>
                        <p class="font-bold">.385</p>
                    </div>
                    <div class="text-center">
                        <p class="text-slate-500 text-xs">RBI</p>
                        <p class="font-bold">6</p>
                    </div>
                    <div class="text-center">
                        <p class="text-slate-500 text-xs">SB</p>
                        <p class="font-bold">0</p>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
