<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>FN HUB | Player Selection</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;700&display=swap');
        
        body { 
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            color: white;
        }

        .font-game { font-family: 'Orbitron', sans-serif; }

        /* Efecto de escaneo tipo videojuego */
        .scanline {
            width: 100%; height: 100px;
            background: linear-gradient(0deg, rgba(34, 197, 94, 0.1) 0%, transparent 100%);
            position: absolute; top: -100px; left: 0;
            animation: scan 4s linear infinite;
        }
        @keyframes scan { 0% { top: -100px; } 100% { top: 100%; } }

        .player-btn {
            clip-path: polygon(10% 0, 100% 0, 90% 100%, 0% 100%);
            transition: all 0.2s ease;
        }
        .player-btn:hover, .player-btn.active {
            background: #22c55e;
            color: black;
            transform: translateX(10px);
        }

        #player-image {
            mask-image: linear-gradient(to right, black 60%, transparent 100%);
            transition: all 0.5s ease;
        }
    </style>
</head>
<body class="flex flex-col">

    <div class="scanline"></div>

    <header class="p-8 flex justify-between items-center border-b border-green-500/30">
        <div>
            <h1 class="font-game text-3xl font-black italic tracking-widest text-green-500">PLAYER_SELECT.v2</h1>
            <p id="update-info" class="text-[10px] font-mono opacity-50 uppercase tracking-tighter"></p>
        </div>
        <div class="text-right">
            <span class="text-xs font-bold text-slate-500 uppercase">League Status</span>
            <div class="flex items-center gap-2 justify-end">
                <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                <span class="font-game text-sm uppercase">Online</span>
            </div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        
        <aside class="w-1/3 p-8 overflow-y-auto border-r border-green-500/10 space-y-2 custom-scrollbar">
            <div id="player-list" class="space-y-3">
                </div>
        </aside>

        <section id="character-viewer" class="flex-1 relative flex items-center justify-center p-12 bg-slate-900/20">
            
            <div class="absolute left-0 top-0 w-full h-full opacity-40 z-0 overflow-hidden">
                <img id="bg-photo" src="" class="w-full h-full object-cover filter blur-xl">
            </div>

            <div class="relative z-10 flex w-full h-full items-center">
                <div class="w-1/2 h-full flex items-center justify-center">
                    <img id="main-photo" src="" class="h-[80%] object-contain drop-shadow-[0_0_50px_rgba(34,197,94,0.3)]">
                </div>

                <div class="w-1/2 space-y-8 animate-fade-in">
                    <div>
                        <p id="v-team" class="font-game text-green-500 text-sm tracking-widest mb-1"></p>
                        <h2 id="v-name" class="font-game text-6xl font-black italic uppercase leading-none border-b-4 border-white inline-block pb-2">---</h2>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-black/60 p-6 border-l-4 border-green-500">
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1 italic">AVG vs Right</p>
                            <p id="v-vs-r" class="font-game text-4xl text-white">.000</p>
                        </div>
                        <div class="bg-black/60 p-6 border-l-4 border-blue-500">
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1 italic">w/ Runners</p>
                            <p id="v-w-r" class="font-game text-4xl text-white">.000</p>
                        </div>
                        <div class="bg-black/60 p-6 border-l-4 border-slate-500 col-span-2">
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1 italic">Fly/Gnd Ratio</p>
                            <p id="v-ratio" class="font-game text-4xl text-white text-center">0.0</p>
                        </div>
                    </div>

                    <div class="bg-green-500 text-black font-black p-2 text-center uppercase tracking-[0.5em] italic">
                        Advanced Scouting Active
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        let players = [];

        async function init() {
            const res = await fetch('liga_data.json');
            const data = await res.json();
            players = data.jugadores;
            document.getElementById('update-info').innerText = `DATA_REFRESH: ${data.actualizado}`;
            
            const list = document.getElementById('player-list');
            players.forEach((p, index) => {
                const btn = document.createElement('button');
                btn.className = `player-btn w-full p-4 text-left font-game text-sm uppercase italic bg-slate-800/40 border-r-4 border-transparent`;
                btn.innerHTML = `<span class="opacity-30 mr-2 text-[10px]">0${index+1}</span> ${p.nombre}`;
                btn.onclick = () => selectPlayer(p, btn);
                list.appendChild(btn);
                
                // Seleccionar el primero por defecto
                if(index === 0) selectPlayer(p, btn);
            });
        }

        function selectPlayer(p, btn) {
            // Animación de cambio
            document.querySelectorAll('.player-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const mainPhoto = document.getElementById('main-photo');
            const bgPhoto = document.getElementById('bg-photo');
            
            // Efecto de parpadeo al cambiar
            mainPhoto.style.opacity = 0;
            
            setTimeout(() => {
                document.getElementById('v-name').innerText = p.nombre;
                document.getElementById('v-team').innerText = p.equipo;
                document.getElementById('v-vs-r').innerText = p.avg_vs_r;
                document.getElementById('v-w-r').innerText = p.avg_runners;
                document.getElementById('v-ratio').innerText = p.ratio;
                
                // URL de la foto (si no existe, usa un placeholder de silueta)
                const imgPath = `fotos/jugadores/${p.nombre.replace(' ', '_')}.png`;
                mainPhoto.src = imgPath;
                bgPhoto.src = imgPath;
                
                // Manejo de error si la foto no existe
                mainPhoto.onerror = () => { mainPhoto.src = 'https://via.placeholder.com/600x800/020617/22c55e?text=NO_IMAGE'; };

                mainPhoto.style.opacity = 1;
            }, 200);
        }

        init();
    </script>
</body>
</html>
