name: Update FENABS Stats
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      # Actualizado a v4 (usa Node 24)
      - uses: actions/checkout@v4 
      
      # Actualizado a v5 (usa Node 24)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Versión más moderna y estable

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Ejecutar el robot extractor
        run: python scraper.py

      - name: Commit and push if changed
        run: |
          git config --global user.name "StatBot"
          git config --global user.email "bot@fenabs.com"
          git fetch origin main
          git reset --soft origin/main
          git add liga_data.json
          git commit -m "Auto-update stats" || exit 0
          git push origin main --force
