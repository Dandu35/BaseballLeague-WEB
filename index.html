<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>FENABS Pro Hub | Grupo Norte</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: white; }
        h1, h2, h3, .font-syne { font-family: 'Syne', sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); }
        .tab-active { color: #22c55e; border-bottom: 2px solid #22c55e; }
        .card-team { transition: all 0.3s ease; }
        .card-team:hover { transform: translateY(-5px); border-color: #22c55e; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-[60] glass border-b border-slate-800">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-green-500 rounded-xl flex items-center justify-center font-black text-black italic">FN</div>
                <h1 class="text-xl font-extrabold uppercase tracking-tighter">BASEBALL<span class="text-green-500">HUB</span></h1>
            </div>
            <div id="status-tag" class="hidden md:block text-[10px] text-slate-500 font-mono">SYNC: --:--</div>
        </div>
        <div class="max-w-7xl mx-auto px-6 flex gap-8 border-t border-slate-800/50">
            <button onclick="switchTab('home')" id="tab-home" class="tab-btn py-4 text-xs font-bold uppercase tracking-widest tab-active">Inicio</button>
            <button onclick="switchTab('equipos')" id="tab-equipos" class="tab-btn py-4 text-xs font-bold uppercase tracking-widest text-slate-400">Equipos</button>
            <button onclick="switchTab('jugadores')" id="tab-jugadores" class="tab-btn py-4 text-xs font-bold uppercase tracking-widest text-slate-400">Jugadores</button>
        </div>
    </nav>

    <main class="pt-44 pb-20 max-w-7xl mx-auto px-6">

        <div id="view-home" class="tab-view">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                <div class="lg:col-span-2">
                    <h2 class="text-4xl font-black italic mb-8 uppercase italic underline decoration-green-500 underline-offset-8">Clasificación General</h2>
                    <div class="overflow-hidden rounded-3xl border border-slate-800 bg-slate-900/40">
                        <table class="w-full text-left">
                            <thead class="bg-slate-900 text-slate-500 text-[10px] font-bold uppercase tracking-widest">
                                <tr>
                                    <th class="p-6">Pos</th>
                                    <th class="p-6">Equipo</th>
                                    <th class="p-6 text-center">G-P</th>
                                    <th class="p-6 text-center text-green-400">AVG</th>
                                </tr>
                            </thead>
                            <tbody id="tabla-cla"></tbody>
                        </table>
                    </div>
                </div>
                <div>
                    <h2 class="text-2xl font-black italic mb-8 uppercase">Líderes</h2>
                    <div id="destacados-mini" class="space-y-4"></div>
                </div>
            </div>
        </div>

        <div id="view-equipos" class="tab-view hidden">
            <h2 class="text-5xl font-black italic mb-12 uppercase">Nuestros Equipos</h2>
            <div id="grid-equipos" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                </div>
        </div>

        <div id="view-jugadores" class="tab-view hidden">
            <div class="flex flex-col md:flex-row justify-between items-end gap-6 mb-12">
                <div>
                    <h2 class="text-5xl font-black italic uppercase">Rosters</h2>
                    <p class="text-slate-500">Busca por nombre o filtra por equipo</p>
                </div>
                <div class="flex gap-4 w-full md:w-auto">
                    <input type="text" id="buscador" onkeyup="filtrarJugadores()" placeholder="Buscar jugador..." class="bg-slate-900 border border-slate-700 rounded-xl px-6 py-3 w-full md:w-64 focus:outline-none focus:border-green-500 transition">
                    <select id="filtro-equipo" onchange="filtrarJugadores()" class="bg-slate-900 border border-slate-700 rounded-xl px-4 py-3 focus:outline-none focus:border-green-500 transition text-sm">
                        <option value="todos">Todos los Equipos</option>
                    </select>
                </div>
            </div>
            <div id="grid-full-jugadores" class="grid grid-cols-1 md:grid-cols-4 gap-6"></div>
        </div>

    </main>

    <div id="modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-slate-950/95 backdrop-blur-xl">
        </div>

    <script>
        let ligaData = {};

        async function init() {
            const res = await fetch('liga_data.json');
            ligaData = await res.json();
            document.getElementById('status-tag').innerText = `SYNC: ${ligaData.actualizado}`;

            renderHome();
            renderEquipos();
            renderJugadores();
            poblarFiltroEquipos();
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-view').forEach(v => v.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active', 'text-white'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.add('text-slate-400'));
            
            document.getElementById(`view-${tabId}`).classList.remove('hidden');
            document.getElementById(`tab-${tabId}`).classList.add('tab-active', 'text-white');
        }

        function renderHome() {
            const tabla = document.getElementById('tabla-cla');
            ligaData.clasificacion.forEach(eq => {
                tabla.innerHTML += `
                    <tr class="border-t border-slate-800 hover:bg-slate-800/30 transition">
                        <td class="p-6 font-bold text-slate-500">${eq.pos}</td>
                        <td class="p-6 font-black uppercase italic">${eq.equipo}</td>
                        <td class="p-6 text-center font-bold text-green-500">${eq.pg}-${eq.pp}</td>
                        <td class="p-6 text-center font-mono text-green-400">${eq.avg}</td>
                    </tr>`;
            });

            const mini = document.getElementById('destacados-mini');
            ligaData.top_bateadores.slice(0, 4).forEach(p => {
                mini.innerHTML += `
                    <div class="flex items-center gap-4 p-4 bg-slate-900/50 border border-slate-800 rounded-2xl">
                        <div class="text-2xl font-black italic text-green-500">${p.stat}</div>
                        <div>
                            <div class="text-sm font-bold uppercase tracking-tight">${p.nombre}</div>
                            <div class="text-[10px] text-slate-500 font-bold uppercase">${p.equipo}</div>
                        </div>
                    </div>`;
            });
        }

        function renderEquipos() {
            const grid = document.getElementById('grid-equipos');
            const equiposUnicos = [...new Set(ligaData.top_bateadores.map(p => p.equipo))];
            
            equiposUnicos.forEach(eq => {
                grid.innerHTML += `
                    <div onclick="verEquipo('${eq}')" class="card-team p-8 bg-slate-900 border border-slate-800 rounded-[32px] cursor-pointer">
                        <div class="w-16 h-16 bg-slate-800 rounded-2xl mb-6 flex items-center justify-center font-black text-2xl italic text-green-500">${eq[0]}</div>
                        <h4 class="text-2xl font-black italic uppercase">${eq}</h4>
                        <p class="text-slate-500 text-sm mt-2 font-bold uppercase tracking-widest">Grupo Norte</p>
                        <div class="mt-6 flex gap-2">
                             <span class="text-[10px] bg-slate-800 px-3 py-1 rounded-full font-bold">ROSTER</span>
                             <span class="text-[10px] bg-slate-800 px-3 py-1 rounded-full font-bold">STATS</span>
                        </div>
                    </div>`;
            });
        }

        function verEquipo(equipo) {
            document.getElementById('filtro-equipo').value = equipo;
            switchTab('jugadores');
            filtrarJugadores();
        }

        function poblarFiltroEquipos() {
            const selector = document.getElementById('filtro-equipo');
            const equipos = [...new Set(ligaData.top_bateadores.map(p => p.equipo))];
            equipos.forEach(eq => {
                selector.innerHTML += `<option value="${eq}">${eq}</option>`;
            });
        }

        function renderJugadores() {
            const grid = document.getElementById('grid-full-jugadores');
            grid.innerHTML = '';
            ligaData.top_bateadores.forEach(p => {
                grid.innerHTML += `
                    <div class="player-item bg-slate-900 p-6 rounded-3xl border border-slate-800 hover:border-green-500 transition group" data-nombre="${p.nombre.toLowerCase()}" data-equipo="${p.equipo}">
                        <p class="text-[10px] font-bold text-slate-500 uppercase mb-1">${p.equipo}</p>
                        <h4 class="font-black italic uppercase text-lg group-hover:text-green-500 transition mb-4">${p.nombre}</h4>
                        <div class="flex justify-between border-t border-slate-800 pt-4">
                            <div><p class="text-[9px] text-slate-500 font-bold uppercase">AVG</p><p class="font-bold">${p.stat}</p></div>
                            <div><p class="text-[9px] text-slate-500 font-bold uppercase">H</p><p class="font-bold">${p.h}</p></div>
                            <div><p class="text-[9px] text-slate-500 font-bold uppercase">RBI</p><p class="font-bold">${p.rbi}</p></div>
                        </div>
                    </div>`;
            });
        }

        function filtrarJugadores() {
            const busqueda = document.getElementById('buscador').value.toLowerCase();
            const equipo = document.getElementById('filtro-equipo').value;
            
            document.querySelectorAll('.player-item').forEach(el => {
                const nombreMatch = el.getAttribute('data-nombre').includes(busqueda);
                const equipoMatch = equipo === 'todos' || el.getAttribute('data-equipo') === equipo;
                
                if (nombreMatch && equipoMatch) {
                    el.classList.remove('hidden');
                } else {
                    el.classList.add('hidden');
                }
            });
        }

        init();
    </script>
</body>
</html>
