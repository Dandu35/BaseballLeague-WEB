<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>FN HUB | Pro Radar Analysis</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;700&display=swap');
        
        body { 
            background: radial-gradient(circle at center, #1e293b 0%, #020617 100%);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            overflow: hidden;
            color: white;
        }
        .font-game { font-family: 'Orbitron', sans-serif; }

        .nav-btn.active { color: #22c55e; border-bottom: 2px solid #22c55e; }

        .player-btn {
            clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%);
            transition: all 0.3s ease;
        }
        .player-btn.active { background: #22c55e; color: black; transform: translateX(10px); }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #22c55e; }

        /* Animación de carga de datos */
        .stat-bar { animation: grow 1s ease-out; transform-origin: left; }
        @keyframes grow { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    </style>
</head>
<body class="flex flex-col">

    <nav class="flex gap-2 p-4 bg-black/60 border-b border-white/10 z-[100] backdrop-blur-md">
        <button onclick="changePage('home')" class="nav-btn px-6 py-2 font-game text-[10px] tracking-widest active" id="btn-home">HOME</button>
        <button onclick="changePage('roster')" class="nav-btn px-6 py-2 font-game text-[10px] tracking-widest" id="btn-roster">PLAYERS</button>
        <button onclick="changePage('ranking')" class="nav-btn px-6 py-2 font-game text-[10px] tracking-widest" id="btn-ranking">RANKING</button>
    </nav>

    <div class="flex-1 overflow-hidden relative">

        <div id="page-home" class="page p-12 overflow-y-auto h-full">
            <h2 class="font-game text-6xl italic mb-4">SYSTEM_READY</h2>
            <p id="update-info" class="text-green-500 font-mono text-sm mb-12 italic underline decoration-green-500/30"></p>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-5xl">
                <div class="bg-white/5 p-8 border-l-4 border-green-500">
                    <h3 class="font-game text-xl mb-4 italic">ANÁLISIS DE RENDIMIENTO</h3>
                    <p class="text-slate-400 leading-relaxed">Bienvenido al Hub de Scouting 2026. Selecciona un jugador en el menú 'PLAYERS' para visualizar su Radar de Habilidades dinámico basado en estadísticas situacionales.</p>
                </div>
            </div>
        </div>

        <div id="page-roster" class="page hidden h-full flex overflow-hidden">
            <aside class="w-1/3 p-6 overflow-y-auto custom-scrollbar bg-black/40 border-r border-white/5">
                <div id="player-list" class="space-y-2"></div>
            </aside>

            <section class="flex-1 relative flex items-center justify-center p-8">
                <div class="absolute inset-0 flex items-center justify-center opacity-10">
                    <div class="w-[600px] h-[600px] border border-green-500 rounded-full animate-pulse"></div>
                    <div class="absolute w-[400px] h-[400px] border border-green-500 rounded-full"></div>
                </div>

                <div class="relative z-10 flex w-full h-full items-center gap-12">
                    <div class="w-2/5 h-full flex items-center justify-center">
                        <img id="main-photo" src="" class="h-[80%] object-contain drop-shadow-[0_0_30px_rgba(34,197,94,0.2)] transition-all duration-500">
                    </div>

                    <div class="w-3/5 space-y-8">
                        <header>
                            <span id="v-team" class="text-[10px] font-game text-green-500 tracking-[0.3em] mb-2 block"></span>
                            <h2 id="v-name" class="font-game text-5xl font-black italic uppercase leading-none border-b-2 border-white/20 pb-4">---</h2>
                        </header>

                        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-center bg-black/40 p-8 rounded-[40px] border border-white/5 backdrop-blur-md">
                            <div class="relative w-full aspect-square flex items-center justify-center">
                                <canvas id="radarChart"></canvas>
                            </div>

                            <div class="space-y-6">
                                <h4 class="font-game text-[10px] text-slate-500 italic uppercase">Situational_Data</h4>
                                <div class="space-y-4">
                                    <div><p class="text-[9px] text-green-500 mb-1">VS_RIGHT</p><p id="v-vs-r" class="font-game text-2xl">.000</p></div>
                                    <div><p class="text-[9px] text-blue-400 mb-1">W_RUNNERS</p><p id="v-w-r" class="font-game text-2xl">.000</p></div>
                                    <div class="pt-4 border-t border-white/5">
                                        <p class="text-[9px] text-slate-500 mb-1">FLY/GND_RATIO</p>
                                        <p id="v-ratio" class="font-game text-xl">0.0</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <div id="page-ranking" class="page hidden p-12 overflow-y-auto h-full">
             <h2 class="font-game text-4xl mb-12 italic text-center text-green-500">LEAGUE_STANDINGS</h2>
             <div id="ranking-container" class="max-w-4xl mx-auto"></div>
        </div>

    </div>

    <script>
        let ligaData = { jugadores: [], clasificacion: [] };
        let radarChart = null;

        async function init() {
            const res = await fetch('liga_data.json');
            ligaData = await res.json();
            document.getElementById('update-info').innerText = `LAST_SYNC: ${ligaData.actualizado}`;
            renderRoster();
        }

        function changePage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`page-${pageId}`).classList.remove('hidden');
            document.getElementById(`btn-${pageId}`).classList.add('active');
            if(pageId === 'ranking') renderRanking();
        }

        function renderRoster() {
            const list = document.getElementById('player-list');
            ligaData.jugadores.forEach((p, i) => {
                const btn = document.createElement('button');
                btn.className = `player-btn w-full p-4 text-left font-game text-[10px] uppercase italic bg-white/5 mb-1`;
                btn.innerHTML = p.nombre.replace(/\./g, '');
                btn.onclick = () => selectPlayer(p, btn);
                list.appendChild(btn);
                if(i === 0) selectPlayer(p, btn);
            });
        }

        function normalizeStat(stat) {
            // Convierte un AVG de .350 en una escala 0-100 (donde .400 es 100)
            let val = parseFloat(stat.replace('.', '0.'));
            let score = (val / 0.450) * 100;
            return Math.min(Math.max(score, 10), 95); // Limitar entre 10 y 95 para que el radar se vea bien
        }

        function selectPlayer(p, btn) {
            document.querySelectorAll('.player-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const photo = document.getElementById('main-photo');
            photo.style.opacity = 0;

            setTimeout(() => {
                document.getElementById('v-name').innerText = p.nombre.replace(/\./g, '');
                document.getElementById('v-team').innerText = p.equipo;
                document.getElementById('v-vs-r').innerText = p.avg_vs_r;
                document.getElementById('v-w-r').innerText = p.avg_runners;
                document.getElementById('v-ratio').innerText = p.ratio;

                // Lógica de carga JPG/PNG
                const cleanName = p.nombre.replace(/\./g, '').trim().replace(/\s+/g, '_');
                photo.src = `fotos/jugadores/${cleanName}.jpg`;
                photo.onerror = () => { photo.src = `fotos/jugadores/${cleanName}.png`; };
                photo.style.opacity = 1;

                // ACTUALIZAR RADAR CHART
                updateRadar([
                    normalizeStat(p.avg_empty),   // Contact
                    normalizeStat(p.avg_runners), // Clutch
                    normalizeStat(p.avg_vs_r),    // Vs Right
                    parseFloat(p.ratio) * 40,     // Power (ajustado)
                    80                             // Discipline (fijo o calculado)
                ]);
            }, 300);
        }

        function updateRadar(stats) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            
            if (radarChart) radarChart.destroy();

            radarChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['CONTACT', 'CLUTCH', 'VS_RIGHT', 'POWER', 'CONSISTENCY'],
                    datasets: [{
                        label: 'Player Skill',
                        data: stats,
                        backgroundColor: 'rgba(34, 197, 94, 0.2)',
                        borderColor: '#22c55e',
                        borderWidth: 3,
                        pointBackgroundColor: '#fff',
                        pointBorderColor: '#22c55e',
                    }]
                },
                options: {
                    scales: {
                        r: {
                            min: 0, max: 100,
                            ticks: { display: false },
                            grid: { color: 'rgba(255, 255, 255, 0.1)' },
                            angleLines: { color: 'rgba(255, 255, 255, 0.1)' },
                            pointLabels: { color: '#94a3b8', font: { family: 'Orbitron', size: 8 } }
                        }
                    },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function renderRanking() {
            const container = document.getElementById('ranking-container');
            container.innerHTML = `<table class="w-full text-left font-game text-xs">
                <thead class="bg-white/5"><tr><th class="p-6">POS</th><th class="p-6">TEAM</th><th class="p-6">W-L</th><th class="p-6 text-green-500">AVG</th></tr></thead>
                <tbody id="ranking-body" class="divide-y divide-white/5"></tbody></table>`;
            const body = document.getElementById('ranking-body');
            ligaData.clasificacion.forEach(e => {
                body.innerHTML += `<tr><td class="p-6 opacity-30">${e.pos}</td><td class="p-6 italic">${e.equipo}</td><td class="p-6">${e.pg}-${e.pp}</td><td class="p-6 font-mono text-green-500">${e.avg}</td></tr>`;
            });
        }

        init();
    </script>
</body>
</html>
