<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>FN HUB | League Management</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;700&display=swap');
        body { background: radial-gradient(circle at center, #1e293b 0%, #020617 100%); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; color: white; }
        .font-game { font-family: 'Orbitron', sans-serif; }
        .nav-btn.active { color: #22c55e; border-bottom: 2px solid #22c55e; }
        .player-btn { clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%); transition: all 0.3s ease; border-left: 0px solid #22c55e; }
        .player-btn.active { background: #22c55e; color: black; transform: translateX(10px); border-left: 8px solid white; }
        .pos-filter { cursor: pointer; transition: 0.2s; opacity: 0.4; font-size: 9px; font-family: 'Orbitron'; }
        .pos-filter.active { opacity: 1; color: #22c55e; border-bottom: 2px solid #22c55e; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #22c55e; }
    </style>
</head>
<body class="flex flex-col">

    <nav class="flex gap-4 p-4 bg-black/60 border-b border-white/10 z-[100] backdrop-blur-md">
        <button onclick="changePage('home')" class="nav-btn px-4 py-2 font-game text-[10px] tracking-widest active" id="btn-home">HOME</button>
        <button onclick="changePage('roster')" class="nav-btn px-4 py-2 font-game text-[10px] tracking-widest" id="btn-roster">ROSTER</button>
        <button onclick="changePage('ranking')" class="nav-btn px-4 py-2 font-game text-[10px] tracking-widest" id="btn-ranking">RANKING</button>
    </nav>

    <div class="flex-1 overflow-hidden relative">

        <div id="page-home" class="page p-12 h-full">
            <h2 class="font-game text-6xl italic mb-4 uppercase">System_Active</h2>
            <p id="update-info" class="text-green-500 font-mono text-xs mb-10"></p>
            <div class="bg-white/5 p-10 border-l-4 border-green-500 max-w-2xl">
                <h3 class="font-game mb-4">MÓDULO DE SCOUTING 2026</h3>
                <p class="text-slate-400 text-sm leading-relaxed">Sincronización completa con el Grupo Norte. Accede al Roster para visualizar el análisis de radar y estadísticas situacionales de cada jugador.</p>
            </div>
        </div>

        <div id="page-roster" class="page hidden h-full flex overflow-hidden">
            <aside class="w-1/3 flex flex-col p-6 bg-black/40 border-r border-white/5">
                <div class="flex justify-between mb-6 border-b border-white/10 pb-4">
                    <button onclick="filterPos('ALL')" class="pos-filter active" id="f-all">ALL</button>
                    <button onclick="filterPos('PITCHER')" class="pos-filter" id="f-pitcher">PITCHERS</button>
                    <button onclick="filterPos('INFIELD')" class="pos-filter" id="f-infield">BATEADORES</button>
                </div>
                <div id="player-list" class="flex-1 overflow-y-auto custom-scrollbar space-y-2"></div>
            </aside>

            <section class="flex-1 relative flex items-center justify-center p-12">
                <div class="relative z-10 flex w-full h-full items-center gap-10">
                    <div class="w-2/5 flex justify-center">
                        <img id="main-photo" src="" class="h-[80vh] object-contain transition-all duration-500 drop-shadow-[0_0_40px_rgba(34,197,94,0.2)]">
                    </div>
                    <div class="w-3/5 space-y-6">
                        <header>
                            <span id="v-team" class="text-[10px] font-game text-green-500 mb-2 block uppercase tracking-widest"></span>
                            <h2 id="v-name" class="font-game text-5xl font-black italic uppercase leading-none pb-4 border-b border-white/10">---</h2>
                            <span id="v-pos" class="inline-block px-3 py-1 bg-green-500 text-black font-black text-[9px] mt-4 skew-x-[-15deg]">POS: ---</span>
                        </header>
                        <div class="bg-black/60 p-8 rounded-[40px] border border-white/5 grid grid-cols-2 gap-8 shadow-2xl">
                            <canvas id="radarChart"></canvas>
                            <div class="flex flex-col justify-center space-y-6">
                                <div class="bg-slate-900/50 p-4 border-r-4 border-green-500 text-right">
                                    <p class="text-[9px] text-slate-500 uppercase">vs Right AVG</p>
                                    <p id="v-vs-r" class="font-game text-2xl">.000</p>
                                </div>
                                <div class="bg-slate-900/50 p-4 border-r-4 border-blue-500 text-right">
                                    <p class="text-[9px] text-slate-500 uppercase">Clutch AVG</p>
                                    <p id="v-w-r" class="font-game text-2xl">.000</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <div id="page-ranking" class="page hidden p-12 overflow-y-auto h-full">
            <h2 class="font-game text-4xl mb-12 italic text-center">LEAGUE_RANKING</h2>
            <div id="ranking-container" class="max-w-4xl mx-auto bg-black/40 rounded-2xl overflow-hidden border border-white/10"></div>
        </div>

    </div>

    <script>
        let ligaData = { jugadores: [] };
        let radarChart = null;
        let currentPosFilter = 'ALL';

        async function init() {
            const res = await fetch('liga_data.json');
            ligaData = await res.json();
            document.getElementById('update-info').innerText = `>> DATABASE_SYNC: ${ligaData.actualizado}`;
            renderRoster();
        }

        function filterPos(pos) {
            currentPosFilter = pos;
            document.querySelectorAll('.pos-filter').forEach(b => b.classList.remove('active'));
            document.getElementById(`f-${pos.toLowerCase()}`).classList.add('active');
            renderRoster();
        }

        function renderRoster() {
            const list = document.getElementById('player-list');
            list.innerHTML = '';
            const filtered = ligaData.jugadores.filter(p => currentPosFilter === 'ALL' || p.posicion === currentPosFilter);
            filtered.forEach((p, i) => {
                const btn = document.createElement('button');
                btn.className = `player-btn w-full p-4 text-left font-game text-[10px] uppercase italic bg-white/5 mb-1 flex justify-between items-center`;
                btn.innerHTML = `<span>${p.nombre.replace(/\./g, '')}</span> <span class="text-[8px] opacity-20">${p.equipo}</span>`;
                btn.onclick = () => selectPlayer(p, btn);
                list.appendChild(btn);
                if(i === 0) selectPlayer(p, btn);
            });
        }

        function selectPlayer(p, btn) {
            document.querySelectorAll('.player-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            const photo = document.getElementById('main-photo');
            photo.style.opacity = 0;
            photo.style.transform = "translateX(20px)";

            setTimeout(() => {
                document.getElementById('v-name').innerText = p.nombre.replace(/\./g, '');
                document.getElementById('v-team').innerText = p.equipo;
                document.getElementById('v-vs-r').innerText = p.avg_vs_r;
                document.getElementById('v-w-r').innerText = p.avg_runners;
                document.getElementById('v-pos').innerText = `POSICIÓN: ${p.posicion}`;
                
                const cleanName = p.nombre.replace(/\./g, '').trim().replace(/\s+/g, '_');
                const imgBase = `fotos/jugadores/${cleanName}`;
                
                const img = new Image();
                img.src = `${imgBase}.jpg`;
                img.onload = () => { photo.src = img.src; photo.style.opacity = 1; photo.style.transform = "translateX(0)"; };
                img.onerror = () => {
                    const img2 = new Image();
                    img2.src = `${imgBase}.png`;
                    img2.onload = () => { photo.src = img2.src; photo.style.opacity = 1; photo.style.transform = "translateX(0)"; };
                    img2.onerror = () => { photo.src = 'https://via.placeholder.com/600x800/020617/22c55e?text=NO_AVATAR'; photo.style.opacity = 1; photo.style.transform = "translateX(0)"; };
                };

                updateRadar([
                    normalizeStat(p.avg_empty), normalizeStat(p.avg_runners), normalizeStat(p.avg_vs_r), parseFloat(p.ratio)*35, 80
                ]);
            }, 250);
        }

        function normalizeStat(stat) {
            let val = parseFloat(stat.replace('.', '0.'));
            return Math.min(Math.max((val / 0.450) * 100, 15), 95);
        }

        function updateRadar(stats) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            if (radarChart) radarChart.destroy();
            radarChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['CONTACT', 'CLUTCH', 'VS_RIGHT', 'POWER', 'CONSISTENCY'],
                    datasets: [{ data: stats, backgroundColor: 'rgba(34, 197, 94, 0.2)', borderColor: '#22c55e', borderWidth: 2, pointRadius: 0 }]
                },
                options: {
                    scales: { r: { min: 0, max: 100, ticks: { display: false }, grid: { color: 'rgba(255,255,255,0.05)' }, angleLines: { color: 'rgba(255,255,255,0.05)' }, pointLabels: { color: '#64748b', font: { family: 'Orbitron', size: 7 } } } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function changePage(pId) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`page-${pId}`).classList.remove('hidden');
            document.getElementById(`btn-${pId}`).classList.add('active');
            if(pId === 'ranking') renderRanking();
        }

        function renderRanking() {
            const container = document.getElementById('ranking-container');
            container.innerHTML = `<table class="w-full text-left font-game text-[10px] uppercase">
                <thead class="bg-white/5"><tr><th class="p-6">POS</th><th class="p-6">TEAM</th><th class="p-6">W-L</th><th class="p-6 text-green-500">AVG</th></tr></thead>
                <tbody class="divide-y divide-white/5">${ligaData.clasificacion.map(e => `<tr><td class="p-6 opacity-30">${e.pos}</td><td class="p-6 italic">${e.equipo}</td><td class="p-6">${e.pg}-${e.pp}</td><td class="p-6 font-mono text-green-500">${e.avg}</td></tr>`).join('')}</tbody></table>`;
        }

        init();
    </script>
</body>
</html>
