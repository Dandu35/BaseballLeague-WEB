<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <title>FN HUB | League Analytics</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Inter:wght@300;700&display=swap');
        body { background: radial-gradient(circle at center, #111827 0%, #020617 100%); font-family: 'Inter', sans-serif; height: 100vh; overflow: hidden; color: white; }
        .font-game { font-family: 'Orbitron', sans-serif; }
        .nav-btn.active { color: #22c55e; border-bottom: 2px solid #22c55e; }
        .player-btn { clip-path: polygon(5% 0, 100% 0, 95% 100%, 0% 100%); transition: all 0.3s; margin-bottom: 2px; }
        .player-btn.active { background: #22c55e; color: black; transform: translateX(10px); }
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #22c55e; }
    </style>
</head>
<body class="flex flex-col">

    <nav class="flex gap-6 p-4 bg-black/60 border-b border-white/5 z-[100] backdrop-blur-md items-center">
        <div class="text-green-500 font-game text-xs mr-4 italic">FN_ANALYTICS_v4</div>
        <button onclick="changePage('home')" class="nav-btn px-4 py-2 font-game text-[10px] active" id="btn-home">HOME</button>
        <button onclick="changePage('roster')" class="nav-btn px-4 py-2 font-game text-[10px]" id="btn-roster">ROSTER</button>
        <button onclick="changePage('ranking')" class="nav-btn px-4 py-2 font-game text-[10px]" id="btn-ranking">RANKING</button>
    </nav>

    <div class="flex-1 overflow-hidden relative">

        <div id="page-roster" class="page hidden h-full flex overflow-hidden">
            <aside class="w-1/4 flex flex-col p-6 bg-black/40 border-r border-white/5">
                <div class="flex justify-between mb-4 border-b border-white/10 pb-4">
                    <button onclick="filterPos('ALL')" class="text-[9px] font-game opacity-50 hover:opacity-100" id="f-all">ALL</button>
                    <button onclick="filterPos('PITCHER')" class="text-[9px] font-game opacity-50 hover:opacity-100" id="f-pitcher">PIT</button>
                    <button onclick="filterPos('BATTER')" class="text-[9px] font-game opacity-50 hover:opacity-100" id="f-batter">BAT</button>
                </div>
                <div id="player-list" class="flex-1 overflow-y-auto custom-scrollbar"></div>
            </aside>

            <section class="flex-1 relative flex items-center justify-center p-8">
                <div class="relative z-10 flex w-full h-full items-center gap-6">
                    <div class="w-1/3 flex justify-center"><img id="main-photo" src="" class="h-[80vh] object-contain transition-all duration-500 drop-shadow-[0_0_30px_rgba(34,197,94,0.2)]"></div>
                    
                    <div class="w-2/3 space-y-4">
                        <header>
                            <span id="v-team" class="text-[9px] font-game text-green-500 mb-1 block uppercase"></span>
                            <h2 id="v-name" class="font-game text-4xl font-black italic uppercase leading-none border-b border-white/10 pb-2">---</h2>
                            <div id="v-pos" class="inline-block px-3 py-0.5 bg-green-500 text-black font-black text-[9px] mt-2 skew-x-[-15deg]">---</div>
                        </header>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-white/5 p-6 rounded-3xl border border-white/5">
                                <h4 class="text-[9px] font-game text-yellow-500 mb-4 tracking-widest uppercase">Season_Totals</h4>
                                <div class="grid grid-cols-3 gap-y-4 gap-x-2 text-center">
                                    <div><p class="text-[8px] opacity-40">AB</p><p id="t-ab" class="font-game text-lg">0</p></div>
                                    <div><p class="text-[8px] opacity-40">HITS</p><p id="t-h" class="font-game text-lg text-green-400">0</p></div>
                                    <div><p class="text-[8px] opacity-40">RBI</p><p id="t-rbi" class="font-game text-lg text-blue-400">0</p></div>
                                    <div><p class="text-[8px] opacity-40">SO</p><p id="t-so" class="font-game text-lg text-red-500">0</p></div>
                                    <div><p class="text-[8px] opacity-40 text-red-300">KL</p><p id="t-kl" class="font-game text-lg text-red-300">0</p></div>
                                    <div><p class="text-[8px] opacity-40">LOB</p><p id="t-lob" class="font-game text-lg text-purple-400">0</p></div>
                                </div>
                            </div>

                            <div class="bg-black/60 p-6 rounded-3xl border border-white/10">
                                <canvas id="radarChart" class="mb-4"></canvas>
                                <div class="flex justify-around text-center border-t border-white/5 pt-4">
                                    <div><p class="text-[8px] opacity-40">AVG</p><p id="v-avg" class="font-game text-xl text-green-500">.000</p></div>
                                    <div><p class="text-[8px] opacity-40">CLUTCH</p><p id="v-clutch" class="font-game text-lg">.000</p></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <div id="page-home" class="page p-12 h-full flex flex-col justify-center">
            <h1 class="font-game text-7xl italic font-black mb-4">BASEBALL_HUB</h1>
            <p id="update-info" class="font-mono text-green-500 text-sm mb-12"></p>
            <div class="max-w-2xl bg-white/5 p-8 border-l-4 border-green-500"><p class="text-slate-400 italic">Sincronización total activa. Datos situacionales y acumulados disponibles para el Grupo Norte.</p></div>
        </div>

        <div id="page-ranking" class="page hidden p-12 overflow-y-auto h-full"><div id="ranking-body" class="max-w-4xl mx-auto"></div></div>
    </div>

    <script>
        let ligaData = { jugadores: [], clasificacion: [] };
        let radarChart = null;

        async function init() {
            const res = await fetch('liga_data.json');
            ligaData = await res.json();
            document.getElementById('update-info').innerText = `>> SYS_READY: ${ligaData.actualizado}`;
            renderRoster();
        }

        function changePage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`page-${id}`).classList.remove('hidden');
            document.getElementById(`btn-${id}`).classList.add('active');
            if(id === 'ranking') renderRanking();
        }

        function renderRoster() {
            const list = document.getElementById('player-list');
            list.innerHTML = '';
            ligaData.jugadores.forEach((p, i) => {
                const btn = document.createElement('button');
                btn.className = `player-btn w-full p-4 text-left font-game text-[9px] uppercase italic bg-white/5`;
                btn.innerHTML = p.nombre;
                btn.onclick = () => selectPlayer(p, btn);
                list.appendChild(btn);
                if(i === 0) selectPlayer(p, btn);
            });
        }

        function selectPlayer(p, btn) {
            document.querySelectorAll('.player-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            // Actualización de textos
            document.getElementById('v-name').innerText = p.nombre.replace(/\./g, '');
            document.getElementById('v-team').innerText = p.equipo;
            document.getElementById('v-pos').innerText = `ROLE: ${p.posicion}`;
            document.getElementById('v-avg').innerText = p.avg || '.000';
            document.getElementById('v-clutch').innerText = p.clutch || '.000';
            
            // Totales
            document.getElementById('t-ab').innerText = p.ab || '0';
            document.getElementById('t-h').innerText = p.h || '0';
            document.getElementById('t-rbi').innerText = p.rbi || '0';
            document.getElementById('t-so').innerText = p.so || '0';
            document.getElementById('t-kl').innerText = p.kl || '0';
            document.getElementById('t-lob').innerText = p.lob || '0';

            // Foto
            const photo = document.getElementById('main-photo');
            const file = p.nombre.replace(/\./g, '').trim().replace(/\s+/g, '_');
            photo.src = `fotos/jugadores/${file}.jpg`;
            photo.onerror = () => { photo.src = `fotos/jugadores/${file}.png`; };

            // Radar
            const rData = [normalize(p.avg), normalize(p.clutch), normalize(p.vs_r), (parseFloat(p.ratio)||0)*30, 80];
            updateRadar(rData);
        }

        function normalize(val) {
            if(!val) return 15;
            let v = parseFloat(val.replace('.', '0.'));
            return Math.min(Math.max((v / 0.450) * 100, 15), 95);
        }

        function updateRadar(stats) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            if (radarChart) radarChart.destroy();
            radarChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: ['CONTACT', 'CLUTCH', 'VS_RIGHT', 'POWER', 'CONSISTENCY'],
                    datasets: [{ data: stats, backgroundColor: 'rgba(34, 197, 94, 0.2)', borderColor: '#22c55e', borderWidth: 2, pointRadius: 0 }]
                },
                options: {
                    scales: { r: { min: 0, max: 100, ticks: { display: false }, grid: { color: 'rgba(255,255,255,0.05)' }, angleLines: { color: 'rgba(255,255,255,0.05)' }, pointLabels: { color: '#64748b', font: { family: 'Orbitron', size: 7 } } } },
                    plugins: { legend: { display: false } }
                }
            });
        }

        function renderRanking() {
            const body = document.getElementById('ranking-body');
            body.innerHTML = `<table class="w-full text-left font-game text-[10px] uppercase">
                <thead class="bg-white/5"><tr><th class="p-6">POS</th><th class="p-6">TEAM</th><th class="p-6">W-L</th><th class="p-6 text-green-500">AVG</th></tr></thead>
                <tbody class="divide-y divide-white/5">${ligaData.clasificacion.map(e => `<tr><td class="p-6 opacity-30">${e.pos}</td><td class="p-6 italic">${e.equipo}</td><td class="p-6">${e.pg}-${e.pp}</td><td class="p-6 text-green-500 font-mono">${e.avg}</td></tr>`).join('')}</tbody></table>`;
        }

        init();
    </script>
</body>
</html>
