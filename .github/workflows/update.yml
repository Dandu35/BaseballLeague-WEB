name: Update FENABS Stats
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install requests beautifulsoup4
      - name: Run scraper
        run: python scraper.py
      - name: Guardar cambios y subir a la web
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "actions@github.com"
          git pull origin main --rebase  # <--- ESTA LÍNEA ES LA CLAVE
          git add liga_data.json
          git commit -m "Actualización automática de estadísticas" || exit 0
          git push origin main
