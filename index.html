<section id="clasificacion" class="max-w-7xl mx-auto p-8">
    <h2 class="text-3xl font-bold mb-6 italic text-green-500">CLASIFICACIÓN</h2>
    <div class="overflow-hidden rounded-2xl border border-slate-800 bg-slate-900/50">
        <table class="w-full text-left border-collapse">
            <thead class="bg-slate-800/50 text-slate-400 text-xs uppercase">
                <tr>
                    <th class="p-4">#</th>
                    <th class="p-4">Equipo</th>
                    <th class="p-4 text-center">PJ</th>
                    <th class="p-4 text-center">G</th>
                    <th class="p-4 text-center">P</th>
                    <th class="p-4 text-center text-green-400">AVG</th>
                </tr>
            </thead>
            <tbody id="tabla-body">
                </tbody>
        </table>
    </div>
</section>

<script>
    fetch('liga_data.json')
        .then(res => res.json())
        .then(data => {
            const tbody = document.getElementById('tabla-body');
            data.clasificacion.forEach(eq => {
                tbody.innerHTML += `
                    <tr class="border-t border-slate-800 hover:bg-slate-800/30 transition">
                        <td class="p-4 font-bold text-slate-500">${eq.pos}</td>
                        <td class="p-4 font-bold">${eq.equipo}</td>
                        <td class="p-4 text-center">${eq.pj}</td>
                        <td class="p-4 text-center text-green-500 font-bold">${eq.pg}</td>
                        <td class="p-4 text-center text-red-500">${eq.pp}</td>
                        <td class="p-4 text-center font-mono">${eq.avg}</td>
                    </tr>
                `;
            });
        });
</script>
